name: JobHunt daily

on:
  schedule:
    # 06:00 UTC daily = 07:00 Lagos (WAT, no DST).
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Gemini, DOCX, and email"
        required: false
        default: "false"
      only:
        description: "Comma-separated source names (e.g. greenhouse,lever)"
        required: false
        default: ""

permissions:
  contents: write   # we commit the day's reports/ folder and seen.sqlite

concurrency:
  group: jobhunt-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
      GMAIL_TO_ADDRESS: ${{ secrets.GMAIL_TO_ADDRESS }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          set -eu
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.only }}" ]; then
            FLAGS="$FLAGS --only ${{ github.event.inputs.only }}"
          fi
          python -m src.main $FLAGS

      - name: Commit reports + dedupe state
        if: always() && github.event_name != 'pull_request'
        run: |
          set -eu
          git config user.name  "jobhunt-bot"
          git config user.email "jobhunt-bot@users.noreply.github.com"
          TODAY="$(date -u +%F)"
          # Reports folder may not exist if the run failed very early; only
          # add what we actually have.
          [ -d "reports/$TODAY" ] && git add "reports/$TODAY"
          [ -f reports/run_log.csv ] && git add reports/run_log.csv
          [ -f db/seen.sqlite ] && git add -f db/seen.sqlite
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "JobHunt: $TODAY run artefacts"
            git push
          fi

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobhunt-${{ github.run_id }}
          path: |
            reports/
            db/seen.sqlite
          if-no-files-found: ignore
          retention-days: 14
